<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aerovan</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="styles.css">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
</head>

<body class="bg-primary text-white">

<!-- NAVBAR -->
<header class="navbar">
  <div class="container flex justify-between items-center">
    
    <h1 class="logo">Aero<span>van</span></h1>

    <nav class="nav-links">
      <a href="#">Home</a>
      <a href="#">Features</a>
      <a href="#">About</a>
      <a href="#">Services</a>
    </nav>

    <button class="btn-primary">Book Now</button>
  </div>
</header>

<!-- HERO -->
<section class="hero">

  <div class="overlay"></div>

  <div class="hero-content">
    <p class="tag">● PREMIUM TRAVEL EXPERIENCE</p>

    <h1>
      Travel <span>Beyond</span><br> Limits
    </h1>

    <p class="subtitle">
      Experience luxury, comfort and adventure like never before — crafted journeys that move you further.
    </p>

    <div class="buttons">
      <button class="btn-primary">Get Started →</button>
      <button class="btn-outline">Learn More</button>
    </div>

    <p class="rating">⭐⭐⭐⭐⭐ Rated 4.9/5 by 50,000+ travellers</p>
    <p class="scroll">SCROLL ↓</p>
  </div>

</section>

</body>
</html>
