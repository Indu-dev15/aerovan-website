<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aerovan</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
    }
  </style>
</head>

<body class="bg-[#0b1a2d] text-white">

<!-- NAVBAR -->
<header class="fixed w-full z-50 backdrop-blur-md bg-[#0b1a2d]/70 border-b border-white/10">
  <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

    <h1 class="text-xl font-bold text-green-400">Aero<span class="text-white">van</span></h1>

    <nav class="hidden md:flex gap-8 text-sm">
      <a href="#" class="hover:text-green-400 transition">Home</a>
      <a href="#" class="hover:text-green-400 transition">Features</a>
      <a href="#" class="hover:text-green-400 transition">About</a>
      <a href="#" class="hover:text-green-400 transition">Services</a>
    </nav>

    <button class="bg-green-500 hover:bg-green-600 px-5 py-2 rounded-full text-sm font-medium transition">
      Book Now
    </button>

  </div>
</header>

<!-- HERO -->
<section class="h-screen flex items-center justify-center text-center relative">

  <!-- Background -->
  <div class="absolute inset-0">
    <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e"
         class="w-full h-full object-cover">
    <div class="absolute inset-0 bg-gradient-to-r from-[#0b1a2d] via-[#0b1a2d]/80 to-green-900/40"></div>
  </div>

  <!-- CONTENT -->
  <div class="relative z-10 max-w-4xl px-6">

    <p class="inline-block px-4 py-1 mb-4 text-xs rounded-full bg-white/10 backdrop-blur border border-white/20">
      ● PREMIUM TRAVEL EXPERIENCE
    </p>

    <h1 class="text-4xl md:text-6xl lg:text-7xl font-extrabold leading-tight">
      Travel <span class="text-green-400">Beyond</span><br> Limits
    </h1>

    <p class="mt-6 text-gray-300 max-w-xl mx-auto">
      Experience luxury, comfort and adventure like never before — crafted journeys that move you further, faster, smarter.
    </p>

    <!-- BUTTONS -->
    <div class="mt-8 flex flex-col sm:flex-row justify-center gap-4">

      <button class="bg-green-500 hover:bg-green-600 px-8 py-3 rounded-full font-medium transition transform hover:scale-105 shadow-lg">
        Get Started →
      </button>

      <button class="border border-white/30 hover:border-green-400 px-8 py-3 rounded-full transition">
        Learn More
      </button>

    </div>

    <!-- RATING -->
    <div class="mt-6 text-sm text-gray-400">
      ⭐⭐⭐⭐⭐ Rated 4.9/5 by 50,000+ travellers
    </div>

    <!-- SCROLL -->
    <div class="mt-10 text-xs tracking-widest text-gray-400">
      SCROLL ↓
    </div>

  </div>

</section>

</body>
</html>
